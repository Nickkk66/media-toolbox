name: build

# Builds Windows + macOS + Linux and uploads the installers/portables to the
# GitHub Release. Trigger by pushing a version tag (e.g. v1.0.1) or manually
# from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-14      # Apple Silicon (arm64)
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # electron-builder builds for the host OS automatically. --publish always
      # uploads the artifacts (and, on Windows, the nsis-web package the stub
      # downloads) to the GitHub Release for this version.
      - name: Build & publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code-signing (unsigned for now).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
