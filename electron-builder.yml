appId: com.pipelinear.mediatoolbox
productName: Media Toolbox
copyright: Copyright © 2026 pipelinear

directories:
  output: build
  buildResources: assets

# Prune onnxruntime-node to the build's own platform/arch (~260 MB -> ~60 MB).
afterPack: scripts/afterPack.js

files:
  - "src/**"
  - "package.json"
  - "!src/songs/inmysystemalbumart.jpg"
  - "!src/songs/You Are in My System.mp3"

# onnxruntime-node ships a native .node addon that cannot be loaded from inside
# the asar archive — unpack it so the AI background-removal tool works packaged.
asarUnpack:
  - "**/node_modules/onnxruntime-node/**"
  # ffprobe/ffmpeg are external processes that can't read inside the asar — unpack
  # src/songs so the About player can read embedded metadata/cover art if present.
  - "src/songs/**"

# NOTE: the heavy native engines (ffmpeg, yt-dlp, Ghostscript, qpdf, exiftool,
# Real-ESRGAN, Whisper, Piper, 7-Zip) are NOT bundled. They download on first use
# (per-OS) from the GitHub "engines-v1" release and cache under <userData>/engines
# (see src/main/engines.js). That keeps every build tiny.

# The web installer derives its package download URL from here.
publish:
  provider: github
  owner: pipelinear
  repo: media-toolbox

# -------- Windows: tiny web installer + a self-contained portable --------
win:
  target:
    - target: nsis-web
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  warningsAsErrors: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Media Toolbox
  # Keep the public download link stable (the website / README point here).
  artifactName: media-toolbox-Setup.${ext}
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  installerSidebar: assets/installerSidebar.bmp
  uninstallerSidebar: assets/uninstallerSidebar.bmp
  installerHeader: assets/installerHeader.bmp

portable:
  artifactName: media-toolbox-Portable.exe

# -------- macOS: dmg (installer) + zip (portable), Apple Silicon, unsigned -----
mac:
  category: public.app-category.utilities
  icon: assets/icon-1024.png
  # Unsigned for now — users right-click → Open on first launch.
  identity: null
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  artifactName: media-toolbox-mac.${ext}

dmg:
  artifactName: media-toolbox-mac.${ext}

# -------- Linux: AppImage (portable) + deb (installer) --------
linux:
  category: Utility
  icon: assets/icon-1024.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: media-toolbox-linux.${ext}
