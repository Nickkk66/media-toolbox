appId: com.nicky.videocompressor
productName: Video Compressor
copyright: Copyright © 2026 Nicky

directories:
  output: build
  buildResources: assets

files:
  - "src/**"
  - "package.json"
  - "!src/songs/inmysystemalbumart.jpg"
  - "!src/songs/You Are in My System.mp3"

# onnxruntime-node ships a native .node addon that cannot be loaded from inside
# the asar archive — unpack it so the AI background-removal tool works packaged.
asarUnpack:
  - "**/node_modules/onnxruntime-node/**"

# Bundle ffmpeg/ffprobe so the installer is fully self-contained.
# These land in <app>/resources/bin and are resolved by ffmpegPath.js.
extraResources:
  - from: vendor/bin
    to: bin
    filter:
      - "ffmpeg.exe"
      - "ffprobe.exe"
      - "yt-dlp.exe"
      - "7za.exe"
  - from: vendor/gs
    to: gs
    filter:
      - "gswin64c.exe"
      - "gsdll64.dll"
  - from: vendor/qpdf
    to: qpdf
    filter:
      - "*.exe"
      - "*.dll"
  # exiftool.exe REQUIRES its exiftool_files/ folder beside it — bundle both.
  - from: vendor/exiftool
    to: exiftool
    filter:
      - "exiftool.exe"
      - "exiftool_files/**"
  # Real-ESRGAN upscaler: exe + runtime dll + bundled models.
  - from: vendor/realesrgan
    to: realesrgan
    filter:
      - "realesrgan-ncnn-vulkan.exe"
      - "vcomp140.dll"
      - "models/**"
  # whisper.cpp transcriber: whisper-cli.exe + ggml/openblas DLLs (models are downloaded).
  - from: vendor/whisper
    to: whisper
    filter:
      - "whisper-cli.exe"
      - "*.dll"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Video Compressor
  # The optional "local-AI models" picker page is added by assets/installer.nsh,
  # which electron-builder auto-includes as <buildResources>/installer.nsh
  # (buildResources = assets). It records choices to $INSTDIR\ai-setup.json and
  # the app downloads the chosen models on first launch (see src/main/main.js).

portable:
  artifactName: VideoCompressor-portable-${version}.exe
